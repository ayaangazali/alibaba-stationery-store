<!DOCTYPE html>
<html>
<head>
<title>Cool Stationery Store</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<div class="header">
	<h1><a href="index.html">Cool Stationery Store</a></h1>
	<a class="cart-link" href="checkout.html">Cart (<span id="cartCount">0</span>)</a>
</div>

<div class="container">

	<h2>Our Products</h2>

	<div id="filters" style="margin-bottom:15px;">
		<button onclick="filterCat('All')">All</button>
		<button onclick="filterCat('Pens')">Pens</button>
		<button onclick="filterCat('Washi Tape')">Washi Tape</button>
		<button onclick="filterCat('Notebooks')">Notebooks</button>
		<button onclick="filterCat('Sticky Notes')">Sticky Notes</button>
		<button onclick="filterCat('Pencils')">Pencils</button>
		<button onclick="filterCat('Highlighters')">Highlighters</button>
	</div>

	<div id="productGrid">
	</div>
	<div class="clear"></div>

</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script>
// build the product cards, optionally filtered by category
function showProducts(cat){
	var html = "";
	for(var i=0;i<products.length;i++){
		var p = products[i];
		if(cat != "All" && p.category != cat){
			continue;
		}
		html += '<div class="product">';
		if(p.sale == true){
			html += '<span class="sale-badge">SALE</span>';
		}
		html += '<img src="'+p.image+'" alt="'+p.name+'">';
		html += '<h3>'+p.name+'</h3>';
		html += '<div class="price">$'+p.price+'</div>';
		html += '<a href="product.html?id='+p.id+'">View Details</a><br><br>';
		html += '<button onclick="addToCart('+p.id+')">Add to Cart</button>';
		html += '</div>';
	}
	$("#productGrid").html(html);
}

function filterCat(cat){
	showProducts(cat);
}

// show everything to start
showProducts("All");
</script>

</body>
</html>
