<!DOCTYPE html>
<html>
<head>
<title>Cool Stationery Store</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<div class="header">
	<h1><a href="index.html">Cool Stationery Store</a></h1>
	<a class="cart-link" href="checkout.html">Cart</a>
</div>

<div class="container">

	<h2>Our Products</h2>

	<div id="productGrid">
	</div>
	<div class="clear"></div>

</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="products.js"></script>
<script src="cart.js"></script>
<script>
// build the product cards
function showProducts(){
	var html = "";
	for(var i=0;i<products.length;i++){
		var p = products[i];
		html += '<div class="product">';
		html += '<img src="'+p.image+'" alt="'+p.name+'">';
		html += '<h3>'+p.name+'</h3>';
		html += '<div class="price">$'+p.price+'</div>';
		html += '<a href="product.html?id='+p.id+'">View Details</a><br><br>';
		html += '<button onclick="addToCart('+p.id+')">Add to Cart</button>';
		html += '</div>';
	}
	$("#productGrid").html(html);
}

showProducts();
</script>

</body>
</html>
